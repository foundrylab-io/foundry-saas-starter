name: Validate Build

on:
  push:
    branches: [main]

# IMPORTANT: do NOT cancel in-progress validations.  Foundry's orchestration
# loop pushes multiple times during a single feature build (cycle 1 push
# triggers validation, cycle 2 retry push happens during validation).
# `cancel-in-progress: true` would kill the running validation and Foundry's
# log fetcher would see "##[error]The operation was canceled" — which got
# treated as a real build failure and rolled back valid generated code.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          POSTGRES_URL: postgresql://user:pass@localhost:5432/db
          STRIPE_SECRET_KEY: sk_test_fake_key_for_build_validation
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_fake
          CLERK_SECRET_KEY: sk_test_fake
          AUTH_SECRET: fake-auth-secret-for-build
